<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Visor - MarmoScans</title>
    <style>
      /* Estilos generales */
      body {
        background-color: #0b0d17;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
        font-family: Arial, sans-serif;
      }

      /* Tu header original */
      header {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 30px;
        background: #0b0d17;
        border-bottom: 1px solid #333;
        box-sizing: border-box;
      }
      .logo {
        font-size: 1.5rem;
        font-weight: bold;
        color: white;
        text-decoration: none;
      }
      .nav-links {
        display: flex;
        gap: 20px;
      }
      .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 0.9rem;
      }

      #manga-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 20px;
      }

      /* Imágenes verticales base (1050px) */
      .page-img {
        width: 95%;
        max-width: 950px;
        margin: 10px auto;
        display: block;
      }

      /* Imágenes dobles (detectadas por script) */
      .double-page {
        max-width: 1600px !important;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      }

      .nav-footer {
        width: 90%;
        max-width: 800px;
        display: flex;
        justify-content: space-between;
        padding: 40px 0;
      }
      .nav-btn {
        color: white;
        text-decoration: none;
        font-weight: bold;
        padding: 10px 20px;
        background: #333;
        border-radius: 5px;
        transition: 0.3s;
      }
      .nav-btn:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html" class="logo">MARMOSCANS</a>
      <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="#">MarmoWeb</a>
        <a href="#">Twitter</a>
        <a href="#">Instagram</a>
        <a href="#">Youtube</a>
      </div>
    </header>

    <div id="manga-container"></div>

    <div class="nav-footer">
      <a id="prev-btn" class="nav-btn">Anterior</a>
      <a id="back-to-list" class="nav-btn">Volver a la lista</a>
      <a id="next-btn" class="nav-btn">Siguiente</a>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const manga = params.get("manga") || "OnePiece";
      const cap = parseInt(params.get("c")) || 1;

      document.getElementById("back-to-list").href =
        `mangas/${manga.toLowerCase()}.html`;
      document.getElementById("next-btn").href =
        `visor.html?manga=${manga}&c=${cap + 1}`;
      document.getElementById("prev-btn").href =
        cap > 1 ? `visor.html?manga=${manga}&c=${cap - 1}` : "#";

      const container = document.getElementById("manga-container");

      function cargarPaginas(i) {
        let p = i.toString().padStart(3, "0");
        let img = new Image();
        img.src = `Marmoscans/${manga}/${cap}/${cap}-${p}.webp`;
        img.className = "page-img";

        img.onload = function () {
          if (this.naturalWidth > 1200) {
            this.classList.add("double-page");
          }
          container.appendChild(img);
          cargarPaginas(i + 1);
        };
      }
      cargarPaginas(1);
    </script>
  </body>
</html>
