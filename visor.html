<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Visor - MarmoScans</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="logo">
        <span class="logo-icon"><i class="fas fa-book-open"></i></span>
        <h1>MarmoScans</h1>
      </div>

      <nav class="main-nav">
        <a href="#" class="nav-link active">Inicio</a>
        <a href="#" class="nav-link">MarmoWeb</a>
        <a href="#" class="nav-link">Twitter</a>
        <a href="#" class="nav-link">Instagram</a>
        <a href="#" class="nav-link">Youtube</a>
      </nav>

      <div class="header-actions">
        <div class="search-box">
          <input type="text" placeholder="Buscar manga..." />
          <i class="fas fa-search"></i>
        </div>
      </div>

      <button class="mobile-menu-btn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <div id="manga-container"></div>

    <div class="nav-footer">
      <a id="prev-btn" class="nav-btn">Anterior</a>
      <a id="back-to-list" class="nav-btn">Volver a la lista</a>
      <a id="next-btn" class="nav-btn">Siguiente</a>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const manga = params.get("manga") || "OnePiece";
      const cap = parseInt(params.get("c")) || 1;

      document.getElementById("back-to-list").href =
        `mangas/${manga.toLowerCase()}.html`;
      document.getElementById("next-btn").href =
        `visor.html?manga=${manga}&c=${cap + 1}`;
      document.getElementById("prev-btn").href =
        cap > 1 ? `visor.html?manga=${manga}&c=${cap - 1}` : "#";

      const container = document.getElementById("manga-container");

      function cargarPaginas(i) {
        let p = i.toString().padStart(3, "0");
        let img = new Image();
        img.src = `Marmoscans/${manga}/${cap}/${cap}-${p}.webp`;
        img.className = "page-img";

        img.onload = function () {
          if (this.naturalWidth > 1200) {
            this.classList.add("double-page");
          }
          container.appendChild(img);
          cargarPaginas(i + 1);
        };
      }
      cargarPaginas(1);
    </script>
  </body>
</html>
